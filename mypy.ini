[mypy]
python_version = 3.11
warn_return_any = False
warn_unused_configs = True
ignore_missing_imports = True
exclude = (?x)(
    \.venv/
    | node_modules/
    | __pycache__/
    | \.git/
  )

# Start with governance only — expand gradually
[mypy-governance.*]
ignore_errors = False
disallow_untyped_defs = False

# Everything else is unchecked for now
[mypy-domains.*]
ignore_errors = True
[mypy-capabilities.*]
ignore_errors = True
[mypy-packs.*]
ignore_errors = True
[mypy-intelligence.*]
ignore_errors = True
[mypy-orchestrator.*]
ignore_errors = True
[mypy-infra.*]
ignore_errors = True
[mypy-state.*]
ignore_errors = True
[mypy-execution.*]
ignore_errors = True
[mypy-shared.*]
ignore_errors = True
[mypy-apps.*]
ignore_errors = True
