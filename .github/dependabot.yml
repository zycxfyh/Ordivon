# Dependabot configuration — Phase 4.9 uv minimal enablement.
#
# GitHub Actions (Phase 4.5) + Python/uv (Phase 4.9).
# npm/pnpm and bun deferred to Phase 4.11+.
# No auto-merge. All Dependabot PRs pass through normal CI gates
# including repo-governance-pr.
#
# See: docs/runtime/dependabot-strategy.md

version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - security/supply-chain
    commit-message:
      prefix: deps

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - security/supply-chain
      - python
    commit-message:
      prefix: deps
