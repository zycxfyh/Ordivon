name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

env:
  PFIOS_ENV: test
  PFIOS_DEBUG: "false"
  PFIOS_AUDIT_LOG_DIR: ./data/logs/audit
  PFIOS_REASONING_PROVIDER: mock
  PFIOS_TIMEZONE: Asia/Shanghai
  NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
  PFIOS_E2E_BASE_URL: http://127.0.0.1:3000

jobs:
  repo-governance-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      PFIOS_DB_URL: duckdb:///./data/github-ci-repo-gov.duckdb

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install Python dev dependencies
        run: uv sync --extra dev

      - name: Get changed files
        run: |
          git diff --name-only \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" \
            > changed_files.txt
          echo "Changed files:"
          cat changed_files.txt

      - name: Run repo governance adapter
        id: repo-gov
        run: |
          ADAPTER="scripts/repo_governance_github_adapter.py"
          EC=0
          uv run python "$ADAPTER" \
            --github-event-path "$GITHUB_EVENT_PATH" \
            --changed-files-file changed_files.txt \
            --json > repo_gov_result.json || EC=$?

          cat repo_gov_result.json

          DECISION=$(python -c "import json; print(json.load(open('repo_gov_result.json')).get('decision',''))")
          echo "decision=$DECISION" >> $GITHUB_OUTPUT
          echo "exit_code=$EC" >> $GITHUB_OUTPUT

          case $EC in
            0) echo "✅ Governance: execute — safe to proceed" ;;
            2) echo "⚠️  Governance: escalate — human review recommended" ;;
            3) echo "❌ Governance: reject — blocked" ;;
            *) echo "❌ Adapter error (exit $EC)";;
          esac

          # escalate (exit 2) → warning, pass
          # reject (exit 3) or error (exit 1) → fail
          if [ "$EC" = "2" ]; then
            echo "::warning::Repo governance: escalate — human review required"
            exit 0
          fi
          exit $EC

      - name: Render evidence report
        if: always()
        run: |
          mkdir -p reports
          uv run python scripts/render_repo_governance_report.py \
            --input repo_gov_result.json \
            --output-dir reports

      - name: Upload evidence artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: repo-governance-evidence
          path: |
            reports/repo-governance-report.json
            reports/repo-governance-report.md
          retention-days: 30

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend-static:
    runs-on: ubuntu-latest
    env:
      PFIOS_DB_URL: duckdb:///./data/github-ci-static.duckdb

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install Python dev dependencies
        run: uv sync --extra dev

      - name: Compile backend modules
        run: uv run python -m compileall apps/api/app domains orchestrator governance execution state infra intelligence capabilities packs scripts shared

      - name: Lint backend
        run: uv run ruff check apps/api/app capabilities domains execution governance infra intelligence orchestrator packs shared state

      - name: Format check backend
        run: uv run ruff format --check apps/api/app capabilities domains execution governance infra intelligence orchestrator packs shared state

      - name: Type check backend (governance)
        continue-on-error: true
        run: uv run mypy governance/

      - name: Dead code check
        continue-on-error: true
        run: uv run vulture governance/ domains/ capabilities/ state/ execution/ shared/ infra/ packs/ intelligence/ orchestrator/ apps/api/app/

      - name: Import cycle check
        continue-on-error: true
        run: uv run lint-imports

      - name: Check architecture boundaries
        run: uv run python scripts/check_architecture.py

  verification-fast:
    runs-on: ubuntu-latest
    env:
      PFIOS_DB_URL: duckdb:///./data/github-ci-verify-fast.duckdb

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install Python dev dependencies
        run: uv sync --extra dev

      - name: Run eval corpus
        run: uv run python evals/run_evals.py

      - name: Run runtime evidence checker
        run: uv run python scripts/check_runtime_evidence.py

      - name: Run architecture checker
        run: uv run python scripts/check_architecture.py

      - name: Smoke repo CLI (valid → execute)
        run: |
          uv run python scripts/repo_governance_cli.py \
            --task-description "Fix unit test naming" \
            --file-path tests/unit/test_example.py \
            --estimated-impact low \
            --reasoning "Small test-only cleanup" \
            --test-plan "uv run pytest tests/unit/test_example.py" \
            --json

      - name: Smoke repo CLI (forbidden → reject)
        run: |
          EC=0
          uv run python scripts/repo_governance_cli.py \
            --task-description "Update environment secret" \
            --file-path .env \
            --estimated-impact low \
            --reasoning "Dangerous secret change" \
            --test-plan "manual review" \
            --json || EC=$?
          # exit 3 = reject is the EXPECTED outcome for forbidden files
          if [ "$EC" = "3" ]; then
            echo "✅ Correctly rejected forbidden .env"
            exit 0
          fi
          echo "❌ Unexpected exit code: $EC (expected 3)"
          exit 1

  backend-unit:
    runs-on: ubuntu-latest
    env:
      PFIOS_DB_URL: duckdb:///./data/github-ci-unit.duckdb

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install Python dev dependencies
        run: uv sync --extra dev

      - name: Run backend unit tests
        run: uv run pytest -q tests/unit

  backend-unit-pg:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: pfios
          POSTGRES_PASSWORD: pfios
          POSTGRES_DB: pfios_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      PFIOS_DB_URL: postgresql://pfios:pfios@127.0.0.1:5432/pfios_test
      PFIOS_ENV: test
      PFIOS_DEBUG: "false"
      PFIOS_REASONING_PROVIDER: mock
      PFIOS_AUDIT_LOG_DIR: ./data/logs/audit
      PFIOS_TIMEZONE: Asia/Shanghai

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
      - name: Install Python dev dependencies
        run: uv sync --extra dev
      - name: Check schema drift (Alembic autogenerate)
        run: bash scripts/check_schema_drift.sh
      - name: Run unit tests on PostgreSQL
        run: uv run pytest -q tests/unit

  backend-integration:
    runs-on: ubuntu-latest
    env:
      PFIOS_DB_URL: duckdb:///./data/github-ci-integration.duckdb

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install Python dev dependencies
        run: uv sync --extra dev

      - name: Run backend integration tests
        run: |
          uv run pytest -q \
            tests/integration/test_hermes_analyze_api.py \
            tests/integration/test_health_monitoring_api.py \
            tests/integration/test_scheduler_persistence.py \
            tests/integration/test_api_product_surfaces.py \
            tests/integration/test_api_semantic_outputs.py \
            tests/integration/test_workflow_run_lineage_api.py

  backend-integration-pg:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: pfios
          POSTGRES_PASSWORD: pfios
          POSTGRES_DB: pfios_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      PFIOS_DB_URL: postgresql://pfios:pfios@127.0.0.1:5432/pfios_test
      PFIOS_ENV: test
      PFIOS_DEBUG: "false"
      PFIOS_REASONING_PROVIDER: mock
      PFIOS_AUDIT_LOG_DIR: ./data/logs/audit
      PFIOS_TIMEZONE: Asia/Shanghai

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
      - name: Install Python dev dependencies
        run: uv sync --extra dev
      - name: Check schema drift (Alembic autogenerate)
        run: bash scripts/check_schema_drift.sh
      - name: Run integration tests on PostgreSQL
        run: |
          uv run pytest -q \
            tests/integration/test_hermes_analyze_api.py \
            tests/integration/test_health_monitoring_api.py \
            tests/integration/test_scheduler_persistence.py \
            tests/integration/test_api_product_surfaces.py \
            tests/integration/test_api_semantic_outputs.py \
            tests/integration/test_workflow_run_lineage_api.py

  frontend-static:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        run: pnpm lint:web

      - name: Type check frontend
        run: pnpm typecheck:web

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build:web

  frontend-components:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend component tests
        run: pnpm --dir apps/web test

  api-contract:
    runs-on: ubuntu-latest
    env:
      PFIOS_DB_URL: duckdb:///./data/github-ci-contract.duckdb

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install Python dev dependencies
        run: uv sync --extra dev

      - name: Regenerate OpenAPI snapshot
        run: uv run python scripts/export_openapi.py

      - name: Assert OpenAPI snapshot is committed
        run: git diff --exit-code -- tests/contracts/openapi.snapshot.json

      - name: Run contract tests
        run: uv run pytest -q tests/contracts

  a11y-smoke:
    runs-on: ubuntu-latest
    needs:
      - frontend-static
      - backend-integration
    env:
      PFIOS_DB_URL: duckdb:///./data/github-ci-a11y.duckdb

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install Python dev dependencies
        run: uv sync --extra dev

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Seed database
        run: uv run python scripts/seed_mvp_e2e.py

      - name: Run accessibility smoke
        run: pnpm test:e2e:a11y

  mvp-e2e:
    runs-on: ubuntu-latest
    needs:
      - backend-integration
      - frontend-build
      - frontend-components
      - api-contract
      - a11y-smoke
    env:
      PFIOS_DB_URL: duckdb:///./data/github-ci-e2e.duckdb

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install Python dev dependencies
        run: uv sync --extra dev

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Seed MVP E2E database
        run: uv run python scripts/seed_mvp_e2e.py

      - name: Run MVP E2E smoke
        run: pnpm test:e2e:mvp
