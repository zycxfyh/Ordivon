name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── pr-fast verification baseline ──────────────────────────────────────────

  pr-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Run Ordivon pr-fast verification baseline
        run: uv run python scripts/run_verification_baseline.py --profile pr-fast

  # ── Python static analysis ─────────────────────────────────────────────────

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Ruff check
        run: uv run ruff check src/ scripts/ tests/ docs/ examples/ skills/
      - name: Ruff format (preview for Markdown)
        run: uv run ruff format --check --preview src/ scripts/ tests/ docs/ examples/ skills/ AGENTS.md

  # ── architecture and runtime evidence ──────────────────────────────────────

  architecture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Check architecture boundaries
        run: uv run python scripts/check_architecture.py

  runtime-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Check runtime evidence integrity
        run: uv run python scripts/check_runtime_evidence.py

  # ── document governance checkers ───────────────────────────────────────────

  document-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Receipt integrity
        run: uv run python scripts/check_receipt_integrity.py
      - name: Verification debt ledger
        run: uv run python scripts/check_verification_debt.py
      - name: Verification gate manifest
        run: uv run python scripts/check_verification_manifest.py
      - name: Document registry
        run: uv run python scripts/check_document_registry.py
      - name: Paper dogfood ledger
        run: uv run python scripts/check_paper_dogfood_ledger.py

  # ── backend tests ──────────────────────────────────────────────────────────

  product-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Product tests (incl. ordivon_verify package + schemas)
        run: uv run pytest tests/unit/product -q

  governance-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Governance unit tests
        run: uv run pytest tests/unit/governance -q

  finance-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Finance unit tests
        run: uv run pytest tests/unit/finance -q

  # ── eval corpus ────────────────────────────────────────────────────────────

  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Eval corpus (24 cases)
        run: uv run python evals/run_evals.py

  # ── Ordivon Verify smoke ───────────────────────────────────────────────────

  verify-native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Native Ordivon Verify
        run: uv run python scripts/ordivon_verify.py all
      - name: Native JSON report
        run: uv run python scripts/ordivon_verify.py all --json

  verify-external-ladder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Standard external (READY)
        run: >
          uv run python scripts/ordivon_verify.py all
          --root tests/fixtures/ordivon_verify_standard_external_repo
          --config tests/fixtures/ordivon_verify_standard_external_repo/ordivon.verify.json
      - name: Clean advisory (DEGRADED, exit 2)
        run: >
          EC=0;
          uv run python scripts/ordivon_verify.py all
          --root tests/fixtures/ordivon_verify_clean_external_repo
          --config tests/fixtures/ordivon_verify_clean_external_repo/ordivon.verify.json
          || EC=$?;
          if [ "$EC" != "2" ]; then echo "Expected exit 2 (DEGRADED), got $EC"; exit 1; fi
      - name: Bad external (BLOCKED, exit 1)
        run: >
          EC=0;
          uv run python scripts/ordivon_verify.py all
          --root tests/fixtures/ordivon_verify_external_repo
          --config tests/fixtures/ordivon_verify_external_repo/ordivon.verify.json
          || EC=$?;
          if [ "$EC" != "1" ]; then echo "Expected exit 1 (BLOCKED), got $EC"; exit 1; fi

  # ── frontend ───────────────────────────────────────────────────────────────

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.0"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint frontend
        run: pnpm lint:web
      - name: Type check frontend
        run: pnpm typecheck:web
      - name: Build frontend
        run: pnpm build:web
      - name: Frontend component tests
        run: pnpm --dir apps/web test

  # ── repo governance (PR only) ──────────────────────────────────────────────

  repo-governance:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Get changed files
        run: |
          git diff --name-only \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" \
            > changed_files.txt
          cat changed_files.txt
      - name: Run repo governance
        id: repo-gov
        run: |
          EC=0
          uv run python scripts/repo_governance_cli.py \
            --task-description "PR changes" \
            --file-path "$(head -1 changed_files.txt)" \
            --estimated-impact low \
            --reasoning "CI automated check" \
            --test-plan "uv run pytest" \
            --json || EC=$?
          echo "exit_code=$EC" >> $GITHUB_OUTPUT
          if [ "$EC" = "2" ]; then
            echo "::warning::Repo governance escalated — human review recommended"
            exit 0
          fi
          exit $EC
