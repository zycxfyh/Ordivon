name: CodeQL

# Phase 4.3: workflow-health hard gate on main branch.
# Init/analyze/upload failure will fail CI.
# Finding severity is NOT a hard gate — findings are security evidence
# requiring human triage. Zero-alert baseline recorded Phase 4.2.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - python
          - javascript-typescript
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        if: matrix.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        if: matrix.language == 'python'
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        if: matrix.language == 'python'
        run: uv sync --extra dev

      - name: Set up Node.js
        if: matrix.language == 'javascript-typescript'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        if: matrix.language == 'javascript-typescript'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node dependencies
        if: matrix.language == 'javascript-typescript'
        run: |
          cd apps/web
          pnpm install --frozen-lockfile

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
